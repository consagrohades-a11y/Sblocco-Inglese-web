name: Wire Exercise Builder composer smoke test

on:
  push:
    branches:
      - agent/exercise-builder-composer-ui

permissions:
  contents: write

jobs:
  wire:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/exercise-builder-composer-ui
          fetch-depth: 0

      - name: Add composer smoke step
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = '.github/workflows/build.yml';
          let source = fs.readFileSync(path, 'utf8');
          if (!source.includes('Smoke test Exercise Builder composer')) {
            const anchor = '            psql -v ON_ERROR_STOP=1 -f "${migration}"\n          done\n';
            if (!source.includes(anchor)) throw new Error('Missing migration loop anchor');
            source = source.replace(anchor, `${anchor}\n      - name: Smoke test Exercise Builder composer\n        run: psql -v ON_ERROR_STOP=1 -f scripts/sql/exercise-builder-composer-smoke.sql\n`);
            fs.writeFileSync(path, source);
          }
          fs.rmSync('.github/workflows/wire-exercise-composer-smoke.yml');
          NODE

      - name: Commit smoke wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Validate Exercise Builder composer in CI"
          git push origin HEAD:agent/exercise-builder-composer-ui
