name: Finalize Exercise Builder bank UI

on:
  push:
    branches:
      - agent/exercise-builder-bank-ui

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/exercise-builder-bank-ui
          fetch-depth: 0

      - name: Ensure route and navigation wiring
        run: |
          node <<'NODE'
          const fs = require('fs');

          const appPath = 'src/App.jsx';
          let app = fs.readFileSync(appPath, 'utf8');
          const importAnchor = "const AdminExerciseDiagnostics = lazy(() => import('./pages/AdminExerciseDiagnostics'));";
          const importBlock = `${importAnchor}\nconst AdminExerciseQuestionBank = lazy(() => import('./pages/AdminExerciseQuestionBank'));\nconst AdminExercisePools = lazy(() => import('./pages/AdminExercisePools'));`;
          if (!app.includes("const AdminExerciseQuestionBank = lazy(() => import('./pages/AdminExerciseQuestionBank'));")) {
            if (!app.includes(importAnchor)) throw new Error('Missing Exercise Builder import anchor');
            app = app.replace(importAnchor, importBlock);
          }
          const routeAnchor = '              <Route path="content/exercises/diagnostics" element={<AdminExerciseDiagnostics />} />';
          const routeBlock = `${routeAnchor}\n              <Route path="content/exercises/questions" element={<AdminExerciseQuestionBank />} />\n              <Route path="content/exercises/pools" element={<AdminExercisePools />} />`;
          if (!app.includes('path="content/exercises/questions"')) {
            if (!app.includes(routeAnchor)) throw new Error('Missing Exercise Builder route anchor');
            app = app.replace(routeAnchor, routeBlock);
          }
          fs.writeFileSync(appPath, app);

          const shellPath = 'src/components/AdminShell.jsx';
          let shell = fs.readFileSync(shellPath, 'utf8');
          const navAnchor = "      { label: 'Diagnostica esercizi', to: '/admin/content/exercises/diagnostics', icon: BarChart3 },";
          const navBlock = `${navAnchor}\n      { label: 'Question Bank', to: '/admin/content/exercises/questions', icon: BookOpen },\n      { label: 'Pool Builder', to: '/admin/content/exercises/pools', icon: Blocks },`;
          if (!shell.includes("to: '/admin/content/exercises/questions'")) {
            if (!shell.includes(navAnchor)) throw new Error('Missing Exercise Builder navigation anchor');
            shell = shell.replace(navAnchor, navBlock);
          }
          fs.writeFileSync(shellPath, shell);

          for (const path of [
            'scripts/wire-exercise-bank-ui.mjs',
            '.github/workflows/wire-exercise-bank-ui.yml',
            '.github/workflows/finalize-exercise-bank-ui.yml',
          ]) {
            if (fs.existsSync(path)) fs.rmSync(path);
          }
          NODE

      - name: Commit finalized wiring
        run: |
          if git diff --quiet; then
            echo "No wiring changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize Exercise Builder bank UI"
          git push origin HEAD:agent/exercise-builder-bank-ui
