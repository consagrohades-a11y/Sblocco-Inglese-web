name: Finalize Exercise Builder results admin v2

on:
  push:
    branches:
      - agent/exercise-builder-results-admin-v2

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/exercise-builder-results-admin-v2

      - name: Copy feature files from original branch
        run: |
          git fetch origin agent/exercise-builder-results-admin
          git checkout origin/agent/exercise-builder-results-admin -- \
            scripts/sql/exercise-builder-results-admin-smoke.sql \
            src/lib/exerciseResultsApi.js \
            src/pages/AdminExerciseResults.jsx \
            supabase/migrations/20260714260000_exercise_builder_admin_results.sql \
            supabase/migrations/20260714260100_exercise_builder_admin_results_hardening.sql

      - name: Wire route and navigation
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('src/App.jsx')
          text = app.read_text()
          import_line = "const AdminExerciseResults = lazy(() => import('./pages/AdminExerciseResults'));"
          anchor = "const AdminExerciseCollections = lazy(() => import('./pages/AdminExerciseCollections'));"
          if import_line not in text:
              text = text.replace(anchor, anchor + "\n" + import_line)
          route = '              <Route path="content/exercises/results" element={<AdminExerciseResults />} />'
          route_anchor = '              <Route path="content/exercises/collections" element={<AdminExerciseCollections />} />'
          if route not in text:
              text = text.replace(route_anchor, route_anchor + "\n" + route)
          app.write_text(text)

          shell = Path('src/components/AdminShell.jsx')
          text = shell.read_text()
          item = "      { label: 'Risultati esercizi', to: '/admin/content/exercises/results', icon: BarChart3 },"
          item_anchor = "      { label: 'Collections', to: '/admin/content/exercises/collections', icon: Blocks },"
          if item not in text:
              text = text.replace(item_anchor, item_anchor + "\n" + item)
          shell.write_text(text)
          PY

      - name: Remove temporary workflow and commit
        run: |
          rm -f .github/workflows/finalize-results-admin-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Exercise Builder results and teacher review"
          git push origin HEAD:agent/exercise-builder-results-admin-v2
