name: Diagnose Question Editor SQL

on:
  push:
    branches:
      - agent/exercise-builder-question-editor

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sblocco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sblocco_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: sblocco_test

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/exercise-builder-question-editor
          fetch-depth: 0

      - name: Apply migrations and capture first failure
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          create role anon nologin;
          create role authenticated nologin;
          create role service_role nologin;
          create schema auth;
          create table auth.users (
            id uuid primary key,
            email text,
            raw_user_meta_data jsonb not null default '{}'::jsonb,
            created_at timestamptz not null default now(),
            confirmed_at timestamptz,
            last_sign_in_at timestamptz
          );
          create function auth.uid() returns uuid language sql stable as $$ select null::uuid $$;
          create function auth.role() returns text language sql stable as $$ select 'authenticated'::text $$;
          create function auth.email() returns text language sql stable as $$ select null::text $$;
          create function auth.jwt() returns jsonb language sql stable as $$ select '{}'::jsonb $$;
          SQL

          report='scripts/sql/question-editor-ci-diagnostic.txt'
          : > "$report"
          failed=0
          for migration in $(find supabase/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            if ! psql -v ON_ERROR_STOP=1 -f "$migration" > /tmp/migration.log 2>&1; then
              {
                echo "FAILED_MIGRATION=$migration"
                echo
                cat /tmp/migration.log
              } > "$report"
              failed=1
              break
            fi
          done
          if [ "$failed" -eq 0 ]; then
            echo 'ALL_MIGRATIONS_PASSED' > "$report"
          fi

      - name: Commit diagnostic report and remove workflow
        run: |
          rm -f .github/workflows/diagnose-question-editor-sql.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record Question Editor migration diagnostic"
          git push origin HEAD:agent/exercise-builder-question-editor
