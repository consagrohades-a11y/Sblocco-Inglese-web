name: Fix Pool Builder responsive layout

on:
  push:
    branches:
      - fix/pool-builder-responsive-layout

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/pool-builder-responsive-layout

      - name: Patch responsive grid
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'src/pages/AdminExercisePools.jsx';
          let source = fs.readFileSync(path, 'utf8');

          const replacements = [
            [
              'mt-6 grid gap-6 xl:grid-cols-[17rem_minmax(0,1fr)_22rem]',
              'mt-6 grid items-start gap-6 xl:grid-cols-[17rem_minmax(0,1fr)] 2xl:grid-cols-[17rem_minmax(0,1fr)_22rem]'
            ],
            [
              'dark:border-white/10 dark:bg-[#16211e] xl:sticky xl:top-24 xl:max-h-[calc(100vh-7rem)] xl:overflow-y-auto"><div className="flex items-center justify-between gap-2"><p className="text-xs font-black uppercase tracking-wide text-moss dark:text-emerald-300">Pool</p>',
              'dark:border-white/10 dark:bg-[#16211e] xl:sticky xl:top-24 xl:row-span-2 xl:max-h-[calc(100vh-7rem)] xl:overflow-y-auto"><div className="flex items-center justify-between gap-2"><p className="text-xs font-black uppercase tracking-wide text-moss dark:text-emerald-300">Pool</p>'
            ],
            [
              '<main className="grid min-w-0 gap-6">',
              '<main className="grid min-w-0 gap-6 xl:col-start-2 xl:row-start-1 2xl:col-start-2">'
            ],
            [
              '<aside className="rounded-2xl border border-ink/10 bg-white p-5 shadow-sm dark:border-white/10 dark:bg-[#16211e] xl:sticky xl:top-24 xl:max-h-[calc(100vh-7rem)] xl:overflow-y-auto"><div className="flex items-end justify-between gap-3"><div><p className="text-xs font-black uppercase tracking-wide text-moss dark:text-emerald-300">Composizione</p>',
              '<aside className="min-w-0 rounded-2xl border border-ink/10 bg-white p-5 shadow-sm dark:border-white/10 dark:bg-[#16211e] xl:col-start-2 xl:row-start-2 2xl:sticky 2xl:top-24 2xl:col-start-3 2xl:row-start-1 2xl:max-h-[calc(100vh-7rem)] 2xl:overflow-y-auto"><div className="flex items-end justify-between gap-3"><div><p className="text-xs font-black uppercase tracking-wide text-moss dark:text-emerald-300">Composizione</p>'
            ]
          ];

          for (const [before, after] of replacements) {
            if (!source.includes(before)) {
              throw new Error(`Expected Pool Builder layout fragment not found: ${before.slice(0, 90)}`);
            }
            source = source.replace(before, after);
          }

          fs.writeFileSync(path, source);
          fs.rmSync('.github/workflows/fix-pool-builder-responsive-layout.yml');
          NODE

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Pool Builder responsive columns"
          git push origin HEAD:fix/pool-builder-responsive-layout
