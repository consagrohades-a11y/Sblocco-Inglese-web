name: Rebase and finalize Exercise Builder Question Editor

on:
  push:
    branches:
      - agent/exercise-builder-question-editor

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/exercise-builder-question-editor
          fetch-depth: 0

      - name: Merge current main and finalize wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --no-edit

          node <<'NODE'
          const fs = require('fs');

          const appPath = 'src/App.jsx';
          let app = fs.readFileSync(appPath, 'utf8');
          const importAnchor = "const AdminExerciseComposer = lazy(() => import('./pages/AdminExerciseComposer'));";
          const editorImport = "const AdminExerciseQuestionEditor = lazy(() => import('./pages/AdminExerciseQuestionEditor'));";
          if (!app.includes(editorImport)) {
            if (!app.includes(importAnchor)) throw new Error('Missing Question Editor import anchor');
            app = app.replace(importAnchor, `${importAnchor}\n${editorImport}`);
          }
          const routeAnchor = '              <Route path="content/exercises/questions" element={<AdminExerciseQuestionBank />} />';
          const editorRoute = '              <Route path="content/exercises/questions/edit" element={<AdminExerciseQuestionEditor />} />';
          if (!app.includes('path="content/exercises/questions/edit"')) {
            if (!app.includes(routeAnchor)) throw new Error('Missing Question Editor route anchor');
            app = app.replace(routeAnchor, `${routeAnchor}\n${editorRoute}`);
          }
          fs.writeFileSync(appPath, app);

          const shellPath = 'src/components/AdminShell.jsx';
          let shell = fs.readFileSync(shellPath, 'utf8');
          const navAnchor = "      { label: 'Question Bank', to: '/admin/content/exercises/questions', icon: BookOpen },";
          const editorNav = "      { label: 'Question Editor', to: '/admin/content/exercises/questions/edit', icon: FileCheck2 },";
          if (!shell.includes("to: '/admin/content/exercises/questions/edit'")) {
            if (!shell.includes(navAnchor)) throw new Error('Missing Question Editor nav anchor');
            shell = shell.replace(navAnchor, `${navAnchor}\n${editorNav}`);
          }
          fs.writeFileSync(shellPath, shell);

          const buildPath = '.github/workflows/build.yml';
          let build = fs.readFileSync(buildPath, 'utf8');
          if (!build.includes('Smoke test Exercise Builder question editor')) {
            const composerSmoke = '      - name: Smoke test Exercise Builder composer\n        run: psql -v ON_ERROR_STOP=1 -f scripts/sql/exercise-builder-composer-smoke.sql\n';
            if (!build.includes(composerSmoke)) throw new Error('Missing composer smoke anchor');
            build = build.replace(composerSmoke, `${composerSmoke}\n      - name: Smoke test Exercise Builder question editor\n        run: psql -v ON_ERROR_STOP=1 -f scripts/sql/exercise-builder-question-editor-smoke.sql\n`);
          }
          fs.writeFileSync(buildPath, build);

          for (const path of [
            '.github/workflows/finalize-exercise-question-editor.yml',
            '.github/workflows/verify-exercise-question-editor.yml',
            '.github/workflows/rebase-question-editor.yml',
          ]) {
            if (fs.existsSync(path)) fs.rmSync(path);
          }
          NODE

          git add -A
          git commit -m "Finalize Exercise Builder Question Editor"
          git push origin HEAD:agent/exercise-builder-question-editor
